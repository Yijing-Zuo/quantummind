statement: 'Bellare Active Learning registry-v1 bounded tree-search probe. This is a bounded-depth backtracking-tree query-model subroutine probe, not an end-to-end claim for the original algorithm. The represented task is to find one solution leaf in an implicit finite search tree with coherent child and predicate access introduced only for this probe. Source-backed parent context: An explicit graph instance with vertices, edges, weights, labels, or local adjacency as required by the named task. Pattern occurrence positions, matches, or the associated string-search report. graph traversal, priority/frontier maintenance, and materializing graph outputs. Bellare Active Learning search_witness_probe Bellare Active Learning search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original
  input context: An explicit graph instance with vertices, edges, weights, labels, It is not a full A*/shortest-path run, an end-to-end dynamic-programming claim, a full optimization workflow, or an all-solutions enumeration. Tree size/depth bounds and reversible child/predicate oracles are introduced assumptions and expert obligations.'
