statement: 'Randomized HITS registry-v1 bounded tree-search probe. This is a bounded-depth backtracking-tree query-model subroutine probe, not an end-to-end claim for the original algorithm. The represented task is to find one solution leaf in an implicit finite search tree with coherent child and predicate access introduced only for this probe. Source-backed parent context: A probability model, data set, or sampler description together with requested estimator parameters. A sample, estimate, or approximate value with the stated randomized or statistical semantics. precision, convergence, sample complexity, and estimator variance. Randomized HITS search_witness_probe Randomized HITS search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: A probability model,
  data set, or sampler description together with requested estimator parameter It is not a full A*/shortest-path run, an end-to-end dynamic-programming claim, a full optimization workflow, or an all-solutions enumeration. Tree size/depth bounds and reversible child/predicate oracles are introduced assumptions and expert obligations.'
input_model: implicit_backtracking_tree_problem
access_model: coherent_backtracking_tree_oracle
output_contract: one_solution_leaf
promises:
