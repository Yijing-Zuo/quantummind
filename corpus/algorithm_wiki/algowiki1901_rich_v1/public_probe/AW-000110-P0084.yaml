statement: 'Census search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: One or more finite strings, sequences, patterns, or alphabets. Original output context: Pattern occurrence positions, matches, or the associated string-search report. Original bottleneck noted for the rich context card: string scanning, dynamic-programming table size, preprocessing, and match reporting. The coherent Boolean oracle and marked-item promise are introduced assumptions, not facts established by the original AlgorithmWiki row. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading barriers.'
input_model: explicit_string_problem
access_model: coherent_boolean_oracle
output_contract: one_witness
promises:
- marked_item_exists
- oracle_model_assumption
size_parameters:
- 'Parameter definition: n: size of set of input strings, m: size of input strings, k: length of substrings, \sigma: function V(k, m) defined as the number of k-mers that are at most m Hamming distance from the motif space, w: size of a word machine'
ambiguities:
- This probe is assumption-bearing and is not an end-to-end speedup claim.
- coherent predicate construction and candidate indexing may fail for the original full-output problem
- The parent context card and source records should be checked before live use.
