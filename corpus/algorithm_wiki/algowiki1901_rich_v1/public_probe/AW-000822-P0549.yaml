statement: 'Rautiainen, Marschall graph-walk probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether local graph transitions and marked vertices or edges define a hitting, path, or witness subroutine. Original input context: An explicit graph instance with vertices, edges, weights, labels, or local adjacency as required by the named task. Original output context: The graph-specific object requested by the named problem, such as a path, tree, matching, flow, component labeling, or traversal result. Original bottleneck noted for the rich context card: graph traversal, priority/frontier maintenance, and materializing graph outputs. Local transition access and marked-item semantics are introduced assumptions, and the original full graph output may still dominate. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or
  data-loading barriers.'
input_model: explicit_graph_problem
access_model: local_graph_transition_oracle
output_contract: one_witness
promises:
- marked_item_exists
- local_transition_access
- oracle_model_assumption
size_parameters:
- 'Parameter definition: m: length of input sequence, V: number of vertices, E: number of edges'
ambiguities:
- This probe is assumption-bearing and is not an end-to-end speedup claim.
- local transition access may not represent the original graph input cheaply
- The parent context card and source records should be checked before live use.
