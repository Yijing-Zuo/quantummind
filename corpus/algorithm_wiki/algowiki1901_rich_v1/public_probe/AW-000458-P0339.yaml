statement: 'Gosper''s algorithm period-structure probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe isolates an actual period, cycle length, recurrence, or modular structure-finding subroutine. Original input context: An iterated function or sequence representation with parameters for the preperiod and cycle length. Original output context: A count, witness, construction, ordering, subset, cycle, or other finite combinatorial output. Original bottleneck noted for the rich context card: dominant bottleneck remains uncertain from the available public source metadata. The periodic promise is introduced only when the public source text supports cycle or period language. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading barriers.'
input_model: explicit_combinatorial_problem
access_model: coherent_boolean_oracle
output_contract: exact_value
promises:
- periodic_structure
- oracle_model_assumption
size_parameters:
- 'Parameter definition: t_f: time to perform one evaluation of f, \mu: the starting index of the cycle, \lambda: the period of the cycle'
ambiguities:
