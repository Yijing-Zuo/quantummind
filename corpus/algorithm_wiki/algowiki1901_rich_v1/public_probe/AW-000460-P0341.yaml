statement: 'Durstenfeld''s Algorithm 235 search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: A finite combinatorial object, integer set, board, recurrence, or witness-search instance. Original output context: A count, witness, construction, ordering, subset, cycle, or other finite combinatorial output. Original bottleneck noted for the rich context card: dominant bottleneck remains uncertain from the available public source metadata. The coherent Boolean oracle and marked-item promise are introduced assumptions, not facts established by the original AlgorithmWiki row. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading barriers.'
input_model: explicit_combinatorial_problem
access_model: coherent_boolean_oracle
output_contract: one_witness
promises:
- marked_item_exists
- oracle_model_assumption
size_parameters:
- 'Parameter definition: n: number of elements'
ambiguities:
- This probe is assumption-bearing and is not an end-to-end speedup claim.
- coherent predicate construction and candidate indexing may fail for the original full-output problem
