statement: 'Kadane''s Algorithm is included as a named whole-algorithm context card for a classical dynamic programming task. The task is to analyze the classical input-output problem, not to certify an end-to-end improvement claim. Input semantics: A numeric array of length n. Output semantics: The maximum subarray value and optionally the interval attaining it. Classical algorithm summary: Kadane''s Algorithm is treated as the named AlgorithmWiki variant for find a contiguous subarray with maximum sum Classical complexity metadata: time O(n); space O(1). Public metadata/source title support includes Joseph B. Kadane, Statistics. Classical complexity recorded for this row: time O(n); space O(1); computation model Word/Real RAM. Dominant bottleneck: Scanning candidate intervals or maintaining dynamic prefix information dominates. The useful review questions are whether the named structure exposes a smaller decision, witness, estimation, or algebraic subproblem; whether the full output size
  dominates any asymptotic gain; and whether the stated access model is realistic for the original input. Provenance used for reconstruction includes public metadata or abstract sources such as Joseph B. Kadane, Statistics.'
input_model: explicit_dynamic_programming_problem
