statement: 'Moravec''s algorithm 1980 is included as a named whole-algorithm context card for a classical image processing task. The task is to analyze the classical input-output problem, not to certify an end-to-end improvement claim. Input semantics: An image or image pyramid/grid of pixel intensities plus detector parameters. Output semantics: A set of detected feature locations, scales, orientations, or descriptors. Classical algorithm summary: Moravec''s algorithm 1980 is treated as the named AlgorithmWiki variant for detect local image features such as corners, blobs, or scale-invariant keypoints Classical complexity metadata: time O(n^3). Public metadata/source title support includes Moravec, Paul. Classical complexity recorded for this row: time O(n^3); space unknown; computation model not stated. Dominant bottleneck: Local filtering, scale-space construction, nonmaximum suppression, and descriptor output dominate. The useful review questions are whether the named structure exposes
  a smaller decision, witness, estimation, or algebraic subproblem; whether the full output size dominates any asymptotic gain; and whether the stated access model is realistic for the original input. Provenance used for reconstruction includes public metadata or abstract sources such as Moravec, Paul.'
