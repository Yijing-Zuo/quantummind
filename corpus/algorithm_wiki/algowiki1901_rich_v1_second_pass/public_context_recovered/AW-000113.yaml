statement: 'Brute Force is included as a named whole-algorithm context card for a classical dynamic programming task. The task is to analyze the classical input-output problem, not to certify an end-to-end improvement claim. Input semantics: A rod length n and a price table for cut lengths. Output semantics: An optimal revenue value and optionally a cut pattern. Classical algorithm summary: Brute Force is treated as the named AlgorithmWiki variant for choose cuts of a rod to maximize total price Classical complexity metadata: time O(n 2^n); space O(n). Public metadata/source title support includes Parallel implementations of TSP brute force algorithm. Classical complexity recorded for this row: time O(n 2^n); space O(n); computation model Word RAM. Dominant bottleneck: The recurrence over lengths and split choices dominates. The useful review questions are whether the named structure exposes a smaller decision, witness, estimation, or algebraic subproblem; whether the full output size dominates
  any asymptotic gain; and whether the stated access model is realistic for the original input. Provenance used for reconstruction includes public metadata or abstract sources such as Parallel implementations of TSP brute force algorithm.'
input_model: explicit_dynamic_programming_problem
access_model: offline_batch_queries
output_contract: full_solution
promises:
- source_backed_classical_context
- whole_algorithm_analysis_input
size_parameters:
- 'Parameter definition: n: length of rod'
ambiguities:
- Some details are reconstructed from AlgorithmWiki metadata rather than an independently fetched full public description.
- The card is a discovery input and does not encode benchmark answers or evaluator labels.
