statement: 'Furer''s algorithm is included as a named whole-algorithm context card for a classical combinatorics task. The task is to analyze the classical input-output problem, not to certify an end-to-end improvement claim. Input semantics: Two integers represented by n-bit or n-limb strings. Output semantics: The exact product integer. Classical algorithm summary: Furer''s algorithm is treated as the named AlgorithmWiki variant for multiply large integers Classical complexity metadata: time O(n \log n 2^{O(\log^*n)}); space O(n) auxiliary. Public metadata/source title support includes Furer. Classical complexity recorded for this row: time O(n \log n 2^{O(\log^*n)}); space O(n) auxiliary; computation model Word RAM. Dominant bottleneck: Recursive splitting, convolution, carry propagation, and writing the full product dominate. The useful review questions are whether the named structure exposes a smaller decision, witness, estimation, or algebraic subproblem; whether the full output size
  dominates any asymptotic gain; and whether the stated access model is realistic for the original input. Provenance used for reconstruction includes public metadata or abstract sources such as Furer.'
input_model: explicit_combinatorial_problem
access_model: random_access_string
output_contract: full_solution
promises:
