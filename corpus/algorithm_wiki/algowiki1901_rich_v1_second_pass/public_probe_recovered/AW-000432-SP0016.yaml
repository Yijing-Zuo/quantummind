statement: 'Raita Algorithm search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: A finite text string, a finite pattern string, and alphabet/hash/preprocessing parameters when stated. Original output context: One or more occurrence positions or a report that no occurrence exists. Original bottleneck noted for the rich context card: Text scanning, preprocessing tables or hashes, and match verification dominate. The coherent Boolean oracle and marked-item promise are introduced assumptions, not facts established by the original AlgorithmWiki row. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading barriers.'
input_model: explicit_string_problem
access_model: coherent_boolean_oracle
output_contract: one_witness
promises:
- marked_item_exists
- oracle_model_assumption
size_parameters:
- 'Parameter definition: m: pattern length, n: length of searchable text, s: size of the alphabet'
ambiguities:
- This probe is assumption-bearing and is not an end-to-end speedup claim.
- coherent predicate construction and candidate indexing may fail for the original full-output problem
- The parent context card and source records should be checked before live use.
