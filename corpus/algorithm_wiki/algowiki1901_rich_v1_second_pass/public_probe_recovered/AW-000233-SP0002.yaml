statement: 'Trial division search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: An integer N represented with n bits and method-specific smoothness or search bounds. Original output context: A nontrivial factor, a complete factorization, or a failure indication under the method assumptions. Original bottleneck noted for the rich context card: Candidate generation, modular arithmetic, smoothness testing, and relation collection dominate. The coherent Boolean oracle and marked-item promise are introduced assumptions, not facts established by the original AlgorithmWiki row. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading barriers.'
