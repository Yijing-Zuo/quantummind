statement: 'Ridder''s method search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: A set of records and operation sequence for insert, delete, query, or search operations. Original output context: A maintained representation and answers to the supported queries. Original bottleneck noted for the rich context card: Update/query costs, balancing, hashing, and representation size dominate. The coherent Boolean oracle and marked-item promise are introduced assumptions, not facts established by the original AlgorithmWiki row. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading barriers.'
input_model: explicit_data_structure_problem
access_model: coherent_boolean_oracle
output_contract: one_witness
promises:
- marked_item_exists
- oracle_model_assumption
size_parameters:
- 'Parameter definition: \epsilon: (additive) tolerance error, n_{max}: maximum number of iterations'
ambiguities:
- This probe is assumption-bearing and is not an end-to-end speedup claim.
- coherent predicate construction and candidate indexing may fail for the original full-output problem
- The parent context card and source records should be checked before live use.
