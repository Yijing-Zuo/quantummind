statement: 'Braziunas & Boutilier 2004 search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: A finite or factored decision process with states or belief states, actions, transitions, observations, rewards, and horizon/discount parameters. Original output context: A policy, value function, plan tree, or approximate policy representation. Original bottleneck noted for the rich context card: Bellman backups, belief-state updates, sampling/search over policies, and representation size dominate. The coherent Boolean oracle and marked-item promise are introduced assumptions, not facts established by the original AlgorithmWiki row. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have
  full-output, preprocessing, or data-loading barriers.'
input_model: explicit_dynamic_programming_problem
access_model: coherent_boolean_oracle
output_contract: one_witness
promises:
- marked_item_exists
- oracle_model_assumption
size_parameters:
- 'n: primary input size parameter for the source-backed task.'
ambiguities:
- This probe is assumption-bearing and is not an end-to-end speedup claim.
- coherent predicate construction and candidate indexing may fail for the original full-output problem
- The parent context card and source records should be checked before live use.
