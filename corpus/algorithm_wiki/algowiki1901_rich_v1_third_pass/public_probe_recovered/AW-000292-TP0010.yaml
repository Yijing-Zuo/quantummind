statement: 'T. Lindeberg and J. Garding (1997) estimation-sampling probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe reformulates the row as estimating the mean, probability, count, or numerical quantity of a bounded random variable. Original input context: Numerical observations, model parameters, tolerance requirements, and iteration or sample limits. Original output context: An estimate with stated tolerance, fitted parameter, or numerical summary. Original bottleneck noted for the rich context card: Sampling or iterative update cost, convergence, and precision control dominate. The bounded variable and coherent sampler are introduced assumptions; any positive result would be query-level only. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading barriers.'
input_model: explicit_numerical_problem
access_model: coherent_estimation_oracle
output_contract: additive_estimate
promises:
- bounded_random_variable
- coherent_access
- oracle_model_assumption
size_parameters:
