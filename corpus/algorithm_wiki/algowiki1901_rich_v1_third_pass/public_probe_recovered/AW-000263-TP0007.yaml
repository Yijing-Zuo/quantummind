statement: 'Harvey Hoeven Lecerf search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: Two integers represented by n-bit or n-limb strings. Original output context: The exact product integer. Original bottleneck noted for the rich context card: Recursive splitting, convolution, carry propagation, and writing the full product dominate. The coherent Boolean oracle and marked-item promise are introduced assumptions, not facts established by the original AlgorithmWiki row. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading barriers.'
