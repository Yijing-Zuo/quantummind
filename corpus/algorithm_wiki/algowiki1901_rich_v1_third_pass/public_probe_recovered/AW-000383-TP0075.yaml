statement: 'McAllester & Singh 1999 estimation-sampling probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe reformulates the row as estimating the mean, probability, count, or numerical quantity of a bounded random variable. Original input context: A finite or factored decision process with states or belief states, actions, transitions, observations, rewards, and horizon/discount parameters. Original output context: A policy, value function, plan tree, or approximate policy representation. Original bottleneck noted for the rich context card: Bellman backups, belief-state updates, sampling/search over policies, and representation size dominate. The bounded variable and coherent sampler are introduced assumptions; any positive result would be query-level only. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading
  barriers.'
input_model: explicit_dynamic_programming_problem
access_model: coherent_estimation_oracle
output_contract: additive_estimate
promises:
- bounded_random_variable
- coherent_access
- oracle_model_assumption
size_parameters:
- 'n: primary input size parameter for the source-backed task.'
ambiguities:
- This probe is assumption-bearing and is not an end-to-end speedup claim.
- variance bounds, coherent sampler construction, and tolerance mapping remain expert obligations
- The parent context card and source records should be checked before live use.
