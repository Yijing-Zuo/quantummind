statement: 'Vertex clustering - Low K. L. and Tan T. S 1997 search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: A polygonal or triangular mesh with vertices, edges, faces, and simplification/error parameters. Original output context: A simplified mesh, merged-facet representation, vertex-clustered mesh, or retiled surface. Original bottleneck noted for the rich context card: Geometric predicates, local error metrics, topology updates, and output mesh construction dominate. The coherent Boolean oracle and marked-item promise are introduced assumptions, not facts established by the original AlgorithmWiki row. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing,
  or data-loading barriers.'
input_model: explicit_geometry_problem
access_model: coherent_boolean_oracle
output_contract: one_witness
promises:
- marked_item_exists
- oracle_model_assumption
size_parameters:
- 'n: primary input size parameter for the source-backed task.'
ambiguities:
- This probe is assumption-bearing and is not an end-to-end speedup claim.
- coherent predicate construction and candidate indexing may fail for the original full-output problem
- The parent context card and source records should be checked before live use.
