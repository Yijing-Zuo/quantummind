statement: 'Stratonovich estimation-sampling probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe reformulates the row as estimating the mean, probability, count, or numerical quantity of a bounded random variable. Original input context: A state-transition model, observation model, covariance/noise parameters, and a sequence of measurements. Original output context: A filtered or predicted state estimate, usually with covariance or uncertainty information. Original bottleneck noted for the rich context card: Matrix updates, covariance propagation, sigma-point or linearization steps, and measurement assimilation dominate. The bounded variable and coherent sampler are introduced assumptions; any positive result would be query-level only. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading barriers.'
