statement: 'Simplification via intermediate hierarchical rep-resentation - He T. Hong L. Kaufman 1995 search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: An image or image sequence with pixel/grid dimensions and scale or detector parameters when stated. Original output context: A set of detected feature locations, regions, descriptors, or detector responses. Original bottleneck noted for the rich context card: Convolutions, scale-space extrema tests, region stability checks, and descriptor materialization dominate. The coherent Boolean oracle and marked-item promise are introduced assumptions, not facts established by the original AlgorithmWiki row. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original
  algorithm may still have full-output, preprocessing, or data-loading barriers.'
input_model: explicit_image_processing_problem
access_model: coherent_boolean_oracle
output_contract: one_witness
promises:
- marked_item_exists
- oracle_model_assumption
size_parameters:
- 'n: primary input size parameter for the source-backed task.'
ambiguities:
- This probe is assumption-bearing and is not an end-to-end speedup claim.
- coherent predicate construction and candidate indexing may fail for the original full-output problem
- The parent context card and source records should be checked before live use.
