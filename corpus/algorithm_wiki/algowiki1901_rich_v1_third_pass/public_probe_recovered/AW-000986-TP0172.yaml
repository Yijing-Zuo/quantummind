statement: 'Abboud, Williams, Yu search-witness probe. This is a subroutine/query-model probe, not an end-to-end claim for the original algorithm. The probe asks whether a predicate over candidates can expose one valid witness, counterexample, path element, pattern occurrence, or feasible object. Original input context: An odd composite integer N represented with n bits and smoothness/search parameters for the p+1 method. Original output context: A nontrivial factor of N or a report that the chosen smoothness attempt did not find one. Original bottleneck noted for the rich context card: Modular sequence arithmetic and the smoothness-dependent search for a revealing gcd dominate. The coherent Boolean oracle and marked-item promise are introduced assumptions, not facts established by the original AlgorithmWiki row. Coherent oracle construction, promise checking, and data-mapping cost remain expert obligations. The original algorithm may still have full-output, preprocessing, or data-loading
  barriers.'
input_model: explicit_combinatorial_problem
access_model: coherent_boolean_oracle
output_contract: one_witness
promises:
- marked_item_exists
- oracle_model_assumption
size_parameters:
- 'Parameter definition: n: number of vectors per set, d: dimension of each vector d = omega(log(n))'
ambiguities:
- This probe is assumption-bearing and is not an end-to-end speedup claim.
- coherent predicate construction and candidate indexing may fail for the original full-output problem
- The parent context card and source records should be checked before live use.
