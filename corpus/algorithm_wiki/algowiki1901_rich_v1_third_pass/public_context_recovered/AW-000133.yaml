statement: 'UKF is included as a named whole-algorithm context card for a classical numerical analysis task. The task is to analyze the classical input-output problem, not to certify an end-to-end improvement claim. Input semantics: A state-transition model, observation model, covariance/noise parameters, and a sequence of measurements. Output semantics: A filtered or predicted state estimate, usually with covariance or uncertainty information. Classical algorithm summary: UKF is reconstructed as a classical numerical analysis task. The source-backed title/name/fact record supports the task: estimate a latent state from a process model and noisy observations. Classical complexity recorded for this row: time O(n^3); space O(n^2); computation model Real RAM. Dominant bottleneck: Matrix updates, covariance propagation, sigma-point or linearization steps, and measurement assimilation dominate. The useful review questions are whether the named structure exposes a smaller decision, witness, estimation,
  or algebraic subproblem; whether the full output size dominates any asymptotic gain; and whether the stated access model is realistic for the original input. Provenance used for reconstruction includes public metadata or abstract sources such as An SLAM algorithm based on improved UKF; A comparison of EKF, UKF, FastSLAM2.0, and UKF-based FastSLAM algorithms.'
input_model: explicit_numerical_problem
access_model: random_access_string
output_contract: estimate
promises:
- source_backed_classical_context
- whole_algorithm_analysis_input
- classical_approximation_algorithm
size_parameters:
- 'Parameter definition: n: number of dimensions in state space'
ambiguities:
- Some details are reconstructed from AlgorithmWiki metadata rather than an independently fetched full public description.
- The card is a discovery input and does not encode benchmark answers or evaluator labels.
